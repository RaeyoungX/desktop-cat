<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 160px;
      height: 210px;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #bubble {
      position: absolute;
      bottom: 158px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid #222;
      border-radius: 12px;
      padding: 5px 9px;
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #222;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    #bubble::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #222;
    }
    #bubble::before {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: white;
      margin-top: -2px;
      z-index: 1;
    }
    #bubble.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="bubble"></div>
  <canvas id="cat" width="160" height="210"></canvas>
  <script src="cat.js"></script>
</body>
</html>
